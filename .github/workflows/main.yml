name: TaskFawry CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  compile-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Test and Build with Maven
      run: mvn clean test
